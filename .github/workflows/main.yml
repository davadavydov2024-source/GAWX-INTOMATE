name: Build GAWX APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Скачиваем код
        uses: actions/checkout@v4

      - name: Настраиваем Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Настраиваем Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Сборка проекта
        run: |
          npx create-expo-app gawx-app --template blank
          cp App.js gawx-app/App.js
          cd gawx-app
          npm install @react-navigation/native @react-navigation/bottom-tabs lucide-react-native
          npx expo install react-native-screens react-native-safe-area-context react-native-svg
          npx expo prebuild --platform android --clean
          cd android
          # Исправление: собираем тестовую версию без проверки подписей
          ./gradlew assembleDebug

      - name: Выдаем готовый APK
        uses: actions/upload-artifact@v4
        with:
          name: GAWX-APK
          path: gawx-app/android/app/build/outputs/apk/debug/app-debug.apk
